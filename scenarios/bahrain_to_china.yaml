scenario:
  name: "Bahrain to China Evacuation"
  description: >
    Evacuating from Bahrain during regional conflict. Bahrain airspace is closed.
    Plan: cross King Fahd Causeway to Saudi Arabia, fly from Saudi airports to China.

user:
  passengers: 1
  passport: "CN"
  budget_usd: 10000
  destination_flex: "anywhere"
  risk_tolerance: "moderate"

origin:
  city: "Bahrain"
  airport_code: "BAH"
  airport_status: "closed"
  country: "Bahrain"
  notes: "Bahrain airspace closed due to Iranian retaliatory strikes on US Fifth Fleet HQ"

destination:
  country: "China"
  preferred_cities:
    - code: "SZX"
      name: "Shenzhen"
    - code: "CAN"
      name: "Guangzhou"
    - code: "PVG"
      name: "Shanghai"
    - code: "PEK"
      name: "Beijing"
    - code: "HKG"
      name: "Hong Kong"

escape_routes:
  - type: "land"
    from: "Bahrain"
    to: "Dammam"
    via: "King Fahd Causeway"
    estimated_hours: 1.5
    notes: "25km bridge, SAR 35 toll. Check if causeway is open before departing."
    status: "likely_open"

  - type: "domestic_flight"
    from: "Dammam"
    to: "Riyadh"
    via: "Saudia / Flynas (DMM→RUH, ~50 flights/day)"
    estimated_hours: 1.25
    notes: "Frequent domestic flights. ~1h15m flight. Add 1h for airport. Total ~2.25h."
    status: "likely_open"

  - type: "land"
    from: "Dammam"
    to: "Riyadh"
    via: "Highway 40 (drive)"
    estimated_hours: 4.0
    notes: "~400km, 4h drive. Backup if domestic flights are cancelled."
    status: "likely_open"

  - type: "domestic_flight"
    from: "Riyadh"
    to: "Jeddah"
    via: "Saudia / Flynas / Flyadeal (RUH→JED, ~30 flights/day)"
    estimated_hours: 2.0
    notes: "~1h45m flight + airport time. Frequent departures."
    status: "likely_open"

operational_airports:
  - code: "DMM"
    name: "King Fahd International"
    city: "Dammam"
    country: "Saudi Arabia"
    status: "open"
    priority: 1
    notes: "Closest to Bahrain. Limited international flights to China."

  - code: "RUH"
    name: "King Khalid International"
    city: "Riyadh"
    country: "Saudi Arabia"
    status: "open"
    priority: 2
    notes: "Best option. Direct flights to China on Saudia, China Southern, Cathay, Air China."

  - code: "JED"
    name: "King Abdulaziz International"
    city: "Jeddah"
    country: "Saudi Arabia"
    status: "open"
    priority: 3
    notes: "Saudia SV882 direct to Guangzhou. Far from conflict zone."

safe_hubs:
  - code: "IST"
    name: "Istanbul Airport"
    city: "Istanbul"
    country: "Turkey"
    notes: "Turkish airspace fully open. Daily TK flights from Riyadh. Connections to all Chinese cities."

  - code: "LHR"
    name: "Heathrow"
    city: "London"
    country: "United Kingdom"
    notes: "BA operates from Riyadh. Long routing but very safe."

  - code: "ADD"
    name: "Bole International"
    city: "Addis Ababa"
    country: "Ethiopia"
    notes: "Ethiopian Airlines hub. Flynas connects from Riyadh."

airspace_status:
  closed:
    - "Bahrain"
    - "Qatar"
    - "UAE"
    - "Kuwait"
    - "Iran"
    - "Iraq"
    - "Israel"
    - "Jordan"
  open:
    - "Saudi Arabia"
    - "Turkey"
    - "Egypt"
    - "Ethiopia"
    - "India"
    - "China"
  restricted:
    - "Oman"

