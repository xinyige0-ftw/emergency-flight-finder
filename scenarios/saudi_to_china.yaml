    country: "India"
    notes: "德里枢纽。印度空域开放，印航飞中国。"

  - code: "LHR"
    name: "希思罗机场"
    city: "London"
    country: "United Kingdom"
    notes: "伦敦枢纽。路线很长但安全。需要过境签证。"

  - code: "ADD"
    name: "博莱国际机场"
    city: "Addis Ababa"
    country: "Ethiopia"
    notes: "埃塞俄比亚航空枢纽。备选方案。"

