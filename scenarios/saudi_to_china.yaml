scenario:
  name: "沙特回国航班监控"
  description: >
    监控从沙特阿拉伯（利雅得、吉达、达曼）飞往中国的所有航班。
    区域冲突导致部分空域关闭，重点关注航班是否能正常起飞。
  conflict_start: "2026-02-28"

user:
  passengers: 1
  passport: "CN"
  budget_usd: 15000
  destination_flex: "anywhere"
  risk_tolerance: "moderate"

origin:
  city: "沙特阿拉伯"
  airport_code: "RUH"
  airport_status: "open"
  country: "Saudi Arabia"
  notes: "沙特空域开放，三大机场均可出发"

destination:
  country: "China"
  preferred_cities:
    - code: "PEK"
      name: "北京"
    - code: "PKX"
      name: "北京大兴"
    - code: "PVG"
      name: "上海"
    - code: "CAN"
      name: "广州"
    - code: "SZX"
      name: "深圳"
    - code: "HKG"
      name: "香港"
    - code: "CTU"
      name: "成都"
    - code: "XIY"
      name: "西安"
    - code: "KMG"
      name: "昆明"
    - code: "XMN"
      name: "厦门"

operational_airports:
  - code: "RUH"
    name: "哈立德国王国际机场"
    city: "Riyadh"
    country: "Saudi Arabia"
    status: "open"
    priority: 1
    notes: "利雅得，沙特最大枢纽。直飞中国航班最多。"

  - code: "JED"
    name: "阿卜杜勒-阿齐兹国王国际机场"
    city: "Jeddah"
    country: "Saudi Arabia"
    status: "open"
    priority: 2
    notes: "吉达，沙特航空直飞广州。远离冲突区域。"

  - code: "DMM"
    name: "法赫德国王国际机场"
    city: "Dammam"
    country: "Saudi Arabia"
    status: "open"
    priority: 3
    notes: "达曼，东部省份。国际航班较少，可转机利雅得。"

safe_hubs:
  - code: "IST"
    name: "伊斯坦布尔机场"
    city: "Istanbul"
    country: "Turkey"
    notes: "土耳其航空枢纽。空域完全开放，每日多班飞中国。最可靠中转选择。"

  - code: "MCT"
    name: "马斯喀特国际机场"
    city: "Muscat"
    country: "Oman"
    notes: "阿曼航空枢纽。空域受限但可用。可转机东南亚。"

  - code: "BKK"
    name: "素万那普机场"
    city: "Bangkok"
    country: "Thailand"
    notes: "曼谷枢纽。空域开放，大量中国航班。"

  - code: "SIN"
    name: "樟宜机场"
    city: "Singapore"
    country: "Singapore"
    notes: "新加坡枢纽。空域开放，多家航司飞中国。"

  - code: "KUL"
    name: "吉隆坡国际机场"
    city: "Kuala Lumpur"
    country: "Malaysia"
    notes: "吉隆坡枢纽。马航及亚航飞中国。"

  - code: "DEL"
    name: "英迪拉·甘地国际机场"
