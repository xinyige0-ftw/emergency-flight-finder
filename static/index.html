<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1a73e8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="/manifest.json">
<title>沙特回国航班监控</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:17px}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue','Microsoft YaHei',sans-serif;background:#f5f6f8;color:#1a1a1a;padding-bottom:80px;line-height:1.5;-webkit-font-smoothing:antialiased}

.header{background:#1a73e8;padding:14px 16px;padding-top:calc(14px + env(safe-area-inset-top));display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:18px;font-weight:700;color:#fff;letter-spacing:.5px}
.header .time{font-size:13px;color:rgba(255,255,255,.85);text-align:right;line-height:1.4}

.summary{display:flex;gap:0;background:#fff;border-bottom:1px solid #e8e8e8}
.summary .stat{flex:1;text-align:center;padding:14px 4px;border-right:1px solid #f0f0f0}
.summary .stat:last-child{border-right:none}
.summary .num{font-size:26px;font-weight:800;line-height:1.2}
.summary .label{font-size:12px;color:#888;margin-top:2px}
.num-green{color:#0d9b4a}
.num-red{color:#d93025}
.num-yellow{color:#e8a000}
.num-gray{color:#999}

.reco{padding:12px 16px;font-size:16px;font-weight:600;display:flex;align-items:center;gap:10px;border-bottom:1px solid #e8e8e8}
.reco.go{background:#e6f4ea;color:#137333}
.reco.wait{background:#fef7e0;color:#7c5800}
.reco .reason{font-weight:400;font-size:14px;margin-top:2px;opacity:.85}

.airspace{padding:10px 16px;background:#fff;border-bottom:1px solid #e8e8e8}
.airspace h3{font-size:12px;color:#888;font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{padding:4px 10px;border-radius:4px;font-size:13px;font-weight:600}
.tag.closed{background:#fce8e6;color:#c5221f}
.tag.open{background:#e6f4ea;color:#137333}
.tag.restricted{background:#fef7e0;color:#7c5800}

.airport-tabs{display:flex;background:#fff;border-bottom:2px solid #e8e8e8;position:sticky;top:0;z-index:50}
.airport-tab{flex:1;text-align:center;padding:14px 8px;cursor:pointer;font-size:15px;font-weight:600;color:#888;border-bottom:3px solid transparent;transition:all .2s;user-select:none}
.airport-tab.active{color:#1a73e8;border-bottom-color:#1a73e8;background:#f0f6ff}
.airport-tab .tab-code{font-size:20px;font-weight:800;display:block;line-height:1.3}
.airport-tab .tab-city{font-size:13px;font-weight:500;display:block}
.airport-tab .tab-count{font-size:12px;color:#aaa;display:block;margin-top:1px}
.airport-tab.active .tab-count{color:#1a73e8}

.filter-bar{background:#fff;border-bottom:1px solid #e8e8e8;padding:8px 12px;display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;align-items:center}
.filter-bar::-webkit-scrollbar{display:none}
.filter-bar select{background:#f5f5f5;color:#333;border:1px solid #ddd;border-radius:8px;padding:8px 12px;font-size:14px;min-height:40px;cursor:pointer}
.filter-bar button{border:none;border-radius:8px;padding:8px 16px;font-size:14px;font-weight:600;min-height:40px;cursor:pointer;flex-shrink:0}
.btn-live{background:#1a73e8;color:#fff}
.btn-auto{background:#f0f0f0;color:#555;border:1px solid #ddd}
.btn-auto.on{background:#e6f4ea;color:#0d9b4a;border-color:#0d9b4a}

.flight-card{background:#fff;margin:8px 10px;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow:hidden;border:1px solid #e8e8e8}
.flight-card.changed{border-color:#d93025;box-shadow:0 0 0 2px rgba(217,48,37,.15)}

.card-top{padding:14px 16px;cursor:pointer;user-select:none}
.card-row1{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.flight-num{font-size:17px;font-weight:700;color:#1a1a1a}
.airline-name{font-size:14px;color:#666}
.status-badge{padding:4px 10px;border-radius:4px;font-size:13px;font-weight:700;margin-left:auto;flex-shrink:0}
.status-badge.operating,.status-badge.landed{background:#e6f4ea;color:#0d9b4a}
.status-badge.scheduled{background:#e8f0fe;color:#1a73e8}
.status-badge.cancelled{background:#fce8e6;color:#d93025}
.status-badge.delayed{background:#fef7e0;color:#e8a000}
.status-badge.unknown{background:#f0f0f0;color:#999}

.card-row2{display:flex;align-items:center;font-size:15px;color:#444;gap:6px}
.route-arrow{color:#999;font-size:13px}
.card-row2 .time{color:#888;font-size:13px;margin-left:auto}

.card-row3{display:flex;align-items:center;gap:5px;margin-top:10px}
.history-label{font-size:12px;color:#999;flex-shrink:0}
.history-dots{display:flex;gap:3px;flex-wrap:wrap}
.dot{width:16px;height:16px;border-radius:3px;flex-shrink:0}
.dot.operating,.dot.landed{background:#0d9b4a}
.dot.cancelled{background:#d93025}
.dot.delayed{background:#e8a000}
.dot.scheduled{background:#a8c7fa}
.dot.unknown,.dot.none{background:#e0e0e0}
.dot-date{font-size:10px;color:#999;text-align:center;line-height:1}

.card-row4{display:flex;align-items:center;gap:6px;margin-top:8px}
.price{font-size:15px;font-weight:600;color:#0d9b4a}
.days-badge{font-size:12px;color:#888;background:#f5f5f5;padding:2px 8px;border-radius:3px}
.changed-badge{font-size:12px;font-weight:700;color:#d93025;background:#fce8e6;padding:2px 8px;border-radius:3px}

.card-detail{display:none;padding:0 16px 16px;font-size:15px;border-top:1px solid #f0f0f0}
.card-detail.open{display:block}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.detail-item{display:flex;flex-direction:column}
.detail-item .dl{font-size:12px;color:#999;text-transform:uppercase}
.detail-item .dv{font-size:15px;color:#333;font-weight:500}

.leg-connector{text-align:center;padding:8px 0;font-size:13px;color:#e8a000;font-weight:600}

.detail-actions{display:flex;gap:8px;margin-top:14px}
.detail-actions a{flex:1;text-align:center;padding:12px;border-radius:8px;text-decoration:none;font-weight:600;font-size:15px}
.btn-book{background:#1a73e8;color:#fff}
.btn-call{background:#f0f0f0;color:#333}

.visa-note{margin-top:8px;padding:8px 10px;border-radius:6px;font-size:14px;border-left:3px solid #e8a000;background:#fffbeb}
.visa-note.ok{border-color:#0d9b4a;background:#f0faf4}

.wa-section{margin:10px;padding:16px;background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);border:1px solid #e8e8e8}
.wa-section h3{font-size:16px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.wa-input-row{display:flex;gap:8px}
.wa-input-row input{flex:1;padding:12px 14px;border:1px solid #ddd;border-radius:8px;font-size:16px;min-height:48px}
.wa-input-row button{padding:12px 18px;border:none;border-radius:8px;font-weight:700;font-size:15px;color:#fff;background:#25d366;cursor:pointer;min-height:48px;flex-shrink:0}
.wa-result{margin-top:10px;font-size:14px}
.wa-steps{font-size:14px;color:#666;line-height:1.8;margin-top:8px}

.footer-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e0e0e0;padding:10px 16px;padding-bottom:calc(10px + env(safe-area-inset-bottom));z-index:60;display:flex;justify-content:space-between;align-items:center}
.footer-bar .info{font-size:13px;color:#999}
.footer-bar button{background:#1a73e8;color:#fff;border:none;padding:12px 22px;border-radius:8px;font-weight:700;font-size:15px;min-height:44px;cursor:pointer}

.empty{text-align:center;padding:40px 16px;color:#999;font-size:15px}
.warn{padding:10px 16px;font-size:13px;text-align:center;color:#888;background:#fef7e0;border-bottom:1px solid #e8e8e8}

.section-title{padding:12px 16px 4px;font-size:13px;font-weight:700;color:#888;letter-spacing:.5px}

.airport-group{display:none}
.airport-group.active{display:block}
</style>
</head>
<body>

<div class="header">
  <h1>沙特回国航班监控</h1>
  <div class="time" id="headerTime">加载中...</div>
</div>

<div class="summary" id="summaryBar">
  <div class="stat"><div class="num num-green" id="countOk">-</div><div class="label">正常/计划</div></div>
  <div class="stat"><div class="num num-red" id="countCancel">-</div><div class="label">已取消</div></div>
  <div class="stat"><div class="num num-yellow" id="countDelay">-</div><div class="label">延误</div></div>
  <div class="stat"><div class="num num-gray" id="countTotal">-</div><div class="label">总航班</div></div>
</div>

<div id="recoSection"></div>
<div id="airspaceSection" class="airspace" style="display:none"></div>

<div class="airport-tabs" id="airportTabs"></div>

<div class="filter-bar">
  <select id="sortBy">
    <option value="score">综合排序</option>
    <option value="depart">按出发时间</option>
    <option value="price">按价格</option>
    <option value="duration">按飞行时长</option>
  </select>
  <select id="maxStops">
    <option value="3">不限中转</option>
    <option value="1">最多1次中转</option>
    <option value="0">仅直飞</option>
  </select>
  <button class="btn-live" onclick="loadData(true)">实时刷新</button>
  <button class="btn-auto" id="autoBtn" onclick="toggleAuto()">自动:关</button>
</div>

<div id="flightsContainer"><div class="empty">正在加载航班数据...</div></div>

<div id="waSectionWrap" style="display:none">
  <div class="section-title">WhatsApp 实时通知</div>
  <div class="wa-section">
    <h3>💬 航班变化通知</h3>
    <p style="font-size:14px;color:#666;margin-bottom:8px">航班取消、延误、恢复运营或价格变动时，第一时间通过WhatsApp通知您。</p>
    <div class="wa-steps">
      使用WhatsApp商业号推送，无需加入沙盒，输入号码即可订阅。
    </div>
    <div class="wa-input-row" style="margin-top:10px">
      <input type="tel" id="waPhone" placeholder="+8613812345678">
      <button onclick="testWA()">测试</button>
      <button onclick="subscribeWA()" style="background:#1a73e8">订阅</button>
    </div>
    <div class="wa-result" id="waResult"></div>
  </div>
</div>

<div class="warn">航班信息变化迅速，请务必与航空公司确认。数据来源：FlightRadar24</div>

<div class="footer-bar">
  <span class="info" id="footerInfo">—</span>
  <button onclick="loadData(true)">刷新</button>
</div>

<script>
const API = '/api';
let autoRefresh = false, countdown = 0, countdownTimer = null;
let activeTab = 'RUH';

const STATUS_CN = {
  operating: '正常运营', scheduled: '已计划', cancelled: '已取消',
  delayed: '延误', unknown: '未知', landed: '已降落',
};

const AIRPORT_NAMES = {RUH:'利雅得', JED:'吉达', DMM:'达曼'};
const AIRPORT_ORDER = ['RUH', 'JED', 'DMM'];
const DAY_CN = {Mon:'周一',Tue:'周二',Wed:'周三',Thu:'周四',Fri:'周五',Sat:'周六',Sun:'周日',daily:'每日'};
function toDaysCN(days) {
  if (!days || !days.length) return '';
  if (days.includes('daily')) return '每日';
  return days.map(d => DAY_CN[d] || d).join('/');
}

function qs(id) { return document.getElementById(id); }

async function loadData(live) {
  const sort = qs('sortBy').value, stops = qs('maxStops').value;
  const url = `${API}/routes?sort_by=${sort}&max_stops=${stops}&live=${!!live}`;
  qs('footerInfo').textContent = '加载中...';
  try {
    const res = await fetch(url);
    const data = await res.json();
    render(data);
    qs('footerInfo').textContent = live ? '已加载实时数据' : '缓存数据';
    if (autoRefresh) startCountdown(120);
  } catch (e) {
    qs('footerInfo').textContent = '加载失败，使用缓存数据';
  }
}

function render(data) {
  qs('headerTime').innerHTML = data.updated_cst + '<br>' + data.updated_ast;

  const rec = data.recommendation;
  if (rec) {
    const cls = rec.action === 'go_now' ? 'go' : 'wait';
    const label = rec.action === 'go_now' ? '建议立即行动' : '建议观望等待';
    qs('recoSection').innerHTML = `<div class="reco ${cls}">
      <span>${rec.action === 'go_now' ? '✈️' : '⏳'}</span>
      <div><strong>${label}</strong><div class="reason">${rec.reason}</div></div></div>`;
  }

  if (data.airspace) {
    let h = '<h3>空域状态</h3><div class="tags">';
    data.airspace.closed.forEach(c => h += `<span class="tag closed">${c} 关闭</span>`);
    data.airspace.restricted.forEach(c => h += `<span class="tag restricted">${c} 受限</span>`);
    data.airspace.open.forEach(c => h += `<span class="tag open">${c}</span>`);
    h += '</div>';
    qs('airspaceSection').innerHTML = h;
    qs('airspaceSection').style.display = '';
  }

  const routesByOrigin = {};
  let cOk = 0, cCancel = 0, cDelay = 0, cTotal = 0;
  const countedFlights = new Set();
  const flightsPerOrigin = {};

  data.routes.forEach(r => {
    if (!r.legs || !r.legs.length) return;
    const firstLeg = r.legs[0];
    const originCode = firstLeg.from;

    if (!countedFlights.has(firstLeg.flight)) {
      countedFlights.add(firstLeg.flight);
      cTotal++;
      if (['operating','landed','scheduled','unknown'].includes(firstLeg.status)) cOk++;
      else if (firstLeg.status === 'cancelled') cCancel++;
      else if (firstLeg.status === 'delayed') cDelay++;
      if (!flightsPerOrigin[originCode]) flightsPerOrigin[originCode] = 0;
      flightsPerOrigin[originCode]++;
    }

    if (!routesByOrigin[originCode]) routesByOrigin[originCode] = [];
    routesByOrigin[originCode].push(r);
  });

  qs('countOk').textContent = cOk;
  qs('countCancel').textContent = cCancel;
  qs('countDelay').textContent = cDelay;
  qs('countTotal').textContent = cTotal;

  const otherOrigins = Object.keys(routesByOrigin).filter(k => !AIRPORT_ORDER.includes(k));
  const allOrigins = [...AIRPORT_ORDER.filter(k => routesByOrigin[k]), ...otherOrigins];

  if (!allOrigins.includes(activeTab) && allOrigins.length > 0) {
    activeTab = allOrigins[0];
  }

  let tabsHtml = '';
  allOrigins.forEach(code => {
    const uniqueCount = flightsPerOrigin[code] || 0;
    const routeCount = (routesByOrigin[code] || []).length;
    const city = AIRPORT_NAMES[code] || code;
    const isActive = code === activeTab ? 'active' : '';
    tabsHtml += `<div class="airport-tab ${isActive}" onclick="switchTab('${code}')">
      <span class="tab-code">${code}</span>
      <span class="tab-city">${city}</span>
      <span class="tab-count">${uniqueCount}个航班 · ${routeCount}条线路</span>
    </div>`;
  });
  qs('airportTabs').innerHTML = tabsHtml;

  let html = '';
  allOrigins.forEach(code => {
    const routes = routesByOrigin[code] || [];
    const isActive = code === activeTab ? 'active' : '';

    html += `<div class="airport-group ${isActive}" id="group-${code}">`;
    routes.forEach(r => {
      html += renderFlightCard(r, data.conflict_start);
    });
    html += '</div>';
  });

  if (!html) html = '<div class="empty">暂无航班数据</div>';
  qs('flightsContainer').innerHTML = html;

  if (data.routes.some(r => r.changed)) {
    try { navigator.vibrate?.(200); } catch(e) {}
  }
}

function switchTab(code) {
  activeTab = code;
  document.querySelectorAll('.airport-tab').forEach(t => {
    t.classList.toggle('active', t.querySelector('.tab-code').textContent === code);
  });
  document.querySelectorAll('.airport-group').forEach(g => {
    g.classList.toggle('active', g.id === 'group-' + code);
  });
}

function renderFlightCard(route, conflictStart) {
  const legs = route.legs || [];
  if (!legs.length) return '';
  const firstLeg = legs[0];
  const lastLeg = legs[legs.length - 1];
  const isMultiLeg = legs.length > 1;
  const changed = route.changed ? 'changed' : '';

  let routeStr = firstLeg.from;
  if (isMultiLeg) {
    legs.forEach((l, i) => {
      if (i > 0) routeStr += ` → ${l.from}`;
    });
  }
  routeStr += ` → ${lastLeg.to}`;

  const flightNums = legs.map(l => l.flight).join(' + ');
  const airlines = [...new Set(legs.map(l => l.airline))].join(' / ');

  const statusPriority = {cancelled:0, delayed:1, unknown:2, scheduled:3, operating:4, landed:5};
  let worstStatus = 'operating';
  legs.forEach(l => {
    if ((statusPriority[l.status] || 2) < (statusPriority[worstStatus] || 2)) worstStatus = l.status;
  });

  let dotsHtml = '';
  const history = firstLeg.history || {};
  const dates = Object.keys(history).sort();
  if (dates.length > 0) {
    dotsHtml = '<div class="card-row3"><span class="history-label">历史:</span><div class="history-dots">';
    dates.forEach(d => {
      const s = history[d] || 'none';
      const dateLabel = d.slice(5);
      dotsHtml += `<div style="display:flex;flex-direction:column;align-items:center;gap:1px" title="${d}: ${STATUS_CN[s]||s}"><div class="dot ${s}"></div><div class="dot-date">${dateLabel}</div></div>`;
    });
    dotsHtml += '</div></div>';
  }

  const priceStr = route.price_economy ? `¥${Math.round(route.price_economy * 7.2).toLocaleString()}` : '';

  const days = firstLeg.days || [];
  const dayStr = toDaysCN(days);

  let cardId = 'card_' + flightNums.replace(/[^a-zA-Z0-9]/g, '_');

  let detailHtml = '<div class="card-detail" id="' + cardId + '">';

  legs.forEach((l, li) => {
    if (li > 0 && l.layover_before != null) {
      detailHtml += `<div class="leg-connector">⏳ 在 ${l.from} 中转等待 ${l.layover_before}小时</div>`;
    }
    const cnyEco = l.price_economy ? `¥${Math.round(l.price_economy * 7.2).toLocaleString()}` : '—';
    const cnyBiz = l.price_business ? `¥${Math.round(l.price_business * 7.2).toLocaleString()}` : '—';
    detailHtml += `<div class="detail-grid">
      <div class="detail-item"><span class="dl">航班</span><span class="dv">${l.flight} ${l.airline}</span></div>
      <div class="detail-item"><span class="dl">机型</span><span class="dv">${l.aircraft || '—'}</span></div>
      <div class="detail-item"><span class="dl">起飞</span><span class="dv">${l.from} ${l.depart_local || l.depart_utc || '—'}</span></div>
      <div class="detail-item"><span class="dl">降落</span><span class="dv">${l.to} ${l.arrive_local || l.arrive_utc || '—'}</span></div>
      <div class="detail-item"><span class="dl">飞行时间</span><span class="dv">${l.duration}小时</span></div>
      <div class="detail-item"><span class="dl">状态</span><span class="dv"><span class="status-badge ${l.status}">${STATUS_CN[l.status]||l.status}</span></span></div>
    </div>`;

    if (l.price_economy) {
      detailHtml += `<div style="margin-top:8px;font-size:14px;color:#666">经济舱 ${cnyEco} · 商务舱 ${cnyBiz}</div>`;
    }

    const bookUrl = l.booking_url || `https://www.google.com/travel/flights?q=${encodeURIComponent(l.from+' to '+l.to+' one way')}`;
    detailHtml += `<div class="detail-actions">
      <a class="btn-book" href="${bookUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">预订 ${l.flight}</a>
      ${l.contact ? `<a class="btn-call" href="tel:${l.contact.replace(/[^+0-9]/g,'')}" onclick="event.stopPropagation()">拨打 ${l.contact}</a>` : ''}
    </div>`;
  });

  detailHtml += '</div>';

  return `<div class="flight-card ${changed}" onclick="toggleCard('${cardId}')">
    <div class="card-top">
      <div class="card-row1">
        <span class="flight-num">${flightNums}</span>
        <span class="airline-name">${airlines}</span>
        <span class="status-badge ${worstStatus}">${STATUS_CN[worstStatus]||worstStatus}</span>
      </div>
      <div class="card-row2">
        <span>${routeStr}</span>
        <span class="route-arrow">·</span>
        <span>${isMultiLeg ? route.num_stops+'转 · ' : '直飞 · '}飞行${route.flight_hours}h</span>
        <span class="time">出发 ${firstLeg.depart_local || firstLeg.depart_utc || ''}</span>
      </div>
      ${dotsHtml}
      <div class="card-row4">
        ${priceStr ? `<span class="price">${priceStr}</span>` : ''}
        ${dayStr ? `<span class="days-badge">${dayStr}</span>` : ''}
        ${route.changed ? '<span class="changed-badge">状态变更!</span>' : ''}
      </div>
    </div>
    ${detailHtml}
  </div>`;
}

function toggleCard(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

async function testWA() {
  const phone = qs('waPhone').value.trim().replace(/\s/g, '');
  const res = qs('waResult');
  if (!phone || !phone.startsWith('+')) {
    res.innerHTML = '<span style="color:#d93025">请输入手机号，以+开头（如 +8613812345678）</span>';
    return;
  }
  res.innerHTML = '<span style="color:#888">发送中...</span>';
  try {
    const resp = await fetch(`${API}/alerts/test`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({phone, channel: 'whatsapp'}),
    });
    const data = await resp.json().catch(() => ({}));
    if (resp.ok && data.ok) {
      res.innerHTML = '<span style="color:#0d9b4a">✓ 已发送，请查看WhatsApp</span>';
    } else {
      res.innerHTML = `<span style="color:#d93025">${data.error || '发送失败'}</span>`;
    }
  } catch(e) {

}

async function subscribeWA() {
  const phone = qs('waPhone').value.trim().replace(/\s/g, '');
  const res = qs('waResult');
  if (!phone || !phone.startsWith('+')) {
    res.innerHTML = '<span style="color:#d93025">请先输入手机号</span>';
    return;
  }
  res.innerHTML = '<span style="color:#888">订阅中...</span>';
  try {
    const resp = await fetch(`${API}/alerts/subscribe`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({phone}),
    });
    const data = await resp.json().catch(() => ({}));
    if (resp.ok && data.ok) {
      res.innerHTML = '<span style="color:#0d9b4a">✓ 已订阅！航班变化时将通过WhatsApp通知您</span>';
    } else {
      res.innerHTML = `<span style="color:#d93025">${data.error || '订阅失败'}</span>`;
    }
  } catch(e) {
    res.innerHTML = '<span style="color:#d93025">网络错误，请重试</span>';
  }
}

function toggleAuto() {
  autoRefresh = !autoRefresh;
  qs('autoBtn').textContent = autoRefresh ? '自动:开' : '自动:关';
  qs('autoBtn').classList.toggle('on', autoRefresh);
  if (autoRefresh) loadData(true);
  else { clearInterval(countdownTimer); qs('footerInfo').textContent = ''; }
}

function startCountdown(seconds) {
  clearInterval(countdownTimer);
  countdown = seconds;
  countdownTimer = setInterval(() => {
    countdown--;
    const m = Math.floor(countdown/60), s = countdown%60;
    qs('footerInfo').textContent = `下次刷新: ${m}分${s.toString().padStart(2,'0')}秒`;
    if (countdown <= 0) { clearInterval(countdownTimer); loadData(true); }
  }, 1000);
}

['sortBy','maxStops'].forEach(id => qs(id).addEventListener('change', () => loadData(false)));
loadData(false);
(async function checkWhatsAppStatus(){
  try {
    const res = await fetch(`${API}/alerts/status`);
    const data = await res.json().catch(() => ({}));
    if (data.whatsapp_enabled) qs('waSectionWrap').style.display = '';
  } catch(e) {}
})();
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
