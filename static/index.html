<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#e94560">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="/manifest.json">
<title>Emergency Flight Finder</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#1a1a2e;color:#eee;font-size:13px;padding-bottom:60px;line-height:1.35}

.top{background:#e94560;padding:8px 10px;display:flex;justify-content:space-between;align-items:center}
.top h1{font-size:13px;font-weight:700}
.top .lang{background:rgba(255,255,255,.2);border:none;color:#fff;padding:2px 6px;border-radius:3px;font-size:11px}
.sub-bar{padding:4px 10px;text-align:center;font-size:11px;opacity:.9;background:#c0392b}

.reco{padding:8px 10px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px}
.reco .icon{font-size:18px}.reco .text{flex:1}.reco .text .reason{font-weight:400;font-size:10px;opacity:.9;margin-top:1px}
.reco.go{background:#27ae60}.reco.wait{background:#f39c12;color:#000}.reco.wait_short{background:#e67e22}

.bar{display:flex;gap:4px;padding:6px 8px;background:#16213e;overflow-x:auto;position:sticky;top:0;z-index:10}
.bar select,.bar button{background:#0f3460;color:#fff;border:1px solid #333;border-radius:4px;padding:4px 6px;font-size:11px}
.bar button{background:#e94560;border:none}.bar button.on{background:#2ecc71}

.section{padding:6px 10px}.section h2{font-size:11px;color:#e94560;margin-bottom:4px;text-transform:uppercase}
.airspace{display:flex;flex-wrap:wrap;gap:2px}.tag{padding:2px 5px;border-radius:3px;font-size:10px;font-weight:600}
.tag.closed{background:#c0392b}.tag.open{background:#27ae60}.tag.restricted{background:#f39c12;color:#000}

.visa-alert{background:#1a1a2e;border:1px solid #f39c12;border-radius:4px;padding:4px 8px;margin:2px 0;font-size:10px}
.visa-alert.ok{border-color:#27ae60}.visa-alert.warn{border-color:#c0392b}

.card{background:#16213e;border-radius:6px;margin:0 8px 6px;border-left:3px solid #f39c12}
.card.high{border-color:#27ae60}.card.low{border-color:#c0392b}.card.changed{animation:pulse .5s 3}
@keyframes pulse{0%,100%{border-color:#e94560}50%{border-color:#fff}}
.card-head{display:flex;align-items:center;padding:8px 10px;cursor:pointer;gap:6px}
.card-head .rank{font-size:16px;font-weight:700;color:#e94560;min-width:26px}
.card-head .info{flex:1;min-width:0}.card-head .name{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-head .badges{display:flex;gap:2px;flex-wrap:wrap;margin-top:2px}
.card-head .meta{text-align:right;min-width:48px}.card-head .time{font-size:14px;font-weight:700}.card-head .price{color:#2ecc71;font-size:11px}

.badge{padding:1px 4px;border-radius:2px;font-size:8px;font-weight:700}
.badge.low-risk{background:#27ae60}.badge.med-risk{background:#f39c12;color:#000}.badge.high-risk{background:#c0392b}
.badge.changed-badge{background:#e94560}.badge.seats-ok{background:#27ae60}.badge.seats-no{background:#c0392b}.badge.over-budget{background:#c0392b}

.card-body{padding:0 10px 8px;display:none;font-size:11px;line-height:1.4}
.card-body.open{display:block}.card-body .row{padding:2px 0;border-bottom:1px solid #1a1a2e;display:flex;justify-content:space-between}
.card-body .label{color:#888;font-size:10px}
.leg{background:#0f3460;padding:5px 8px;border-radius:4px;margin:4px 0;font-size:11px}
.leg .fn{font-weight:700}.leg .leg-badges{margin-top:2px}
.status{padding:1px 4px;border-radius:2px;font-size:9px;font-weight:600;display:inline-block}
.status.operating{background:#27ae60}.status.scheduled{background:#2980b9}.status.cancelled{background:#c0392b}.status.unknown{background:#7f8c8d}.status.delayed{background:#f39c12;color:#000}
.actions{display:flex;gap:6px;margin-top:6px}
.actions a{flex:1;text-align:center;padding:10px;border-radius:6px;text-decoration:none;font-weight:700;font-size:12px;min-height:40px;display:flex;align-items:center;justify-content:center}
.actions .book{background:#2ecc71;color:#000}.actions .call{background:#3498db;color:#fff}
.ground{background:#0f3460;padding:5px 8px;border-radius:4px;margin:4px 0;font-size:10px;color:#aaa}

.news-item{background:#16213e;border-radius:4px;padding:6px 8px;margin-bottom:4px;font-size:11px}
.news-item .headline{font-weight:600}.news-item .meta{font-size:10px;color:#888;margin-top:1px}
.news-item.high{border-left:2px solid #e94560}.news-item.medium{border-left:2px solid #f39c12}
.airspace-alert{border-radius:4px;padding:6px 8px;margin-bottom:4px;font-size:11px;font-weight:600}
.airspace-alert{background:#c0392b}.airspace-alert.reopen{background:#27ae60}

.report,.ride{background:#16213e;border-radius:4px;padding:6px 8px;margin-bottom:4px;font-size:11px}
.report .vote{background:#0f3460;border:none;color:#2ecc71;padding:2px 6px;border-radius:3px;font-size:10px;cursor:pointer;float:right}
.ride .route{font-weight:700;font-size:12px}.ride .detail{font-size:10px;color:#888;margin-top:1px}
.ride a{color:#3498db;text-decoration:none}

.tabs{display:flex;padding:0 8px;margin-top:4px}.tab{flex:1;text-align:center;padding:5px;font-size:10px;font-weight:600;color:#888;border-bottom:2px solid transparent;cursor:pointer}
.tab.active{color:#e94560;border-color:#e94560}.tab-content{display:none}.tab-content.active{display:block}

.steps{padding:6px 10px}.steps li{margin-bottom:3px;padding-left:2px;font-size:11px}
.warn{padding:6px 10px;font-size:10px;text-align:center;font-weight:600;background:#f39c12;color:#000}
.refresh-bar{position:fixed;bottom:0;left:0;right:0;background:#16213e;border-top:1px solid #333;padding:6px 10px;z-index:20;display:flex;justify-content:space-between;align-items:center}
.refresh-bar .timer{font-size:11px;color:#888}.refresh-bar button{background:#e94560;color:#fff;border:none;padding:6px 12px;border-radius:4px;font-weight:700;font-size:11px}
.loading,.empty{text-align:center;padding:20px;color:#888;font-size:12px}

.insight{background:#16213e;border-radius:4px;padding:5px 8px;margin-bottom:4px;font-size:10px;border-left:2px solid #3498db}
.insight.trend_up{border-color:#27ae60}.insight.trend_down{border-color:#c0392b}.insight.stable{border-color:#2ecc71}
</style>
</head>
<body>

<div class="top">
  <h1 id="titleText">EMERGENCY FLIGHT FINDER</h1>
  <select class="lang" id="langSelect" onchange="switchLang(this.value)">
    <option value="en">EN</option>
    <option value="zh">中文</option>
    <option value="ar">عربي</option>
  </select>
</div>
<div class="sub-bar" id="updated">Loading...</div>

<div id="recoSection"></div>

<div class="bar">
  <select id="speed" title="Speed priority">
    <option value="balanced">Balanced</option>
    <option value="soonest">Soonest</option>
    <option value="shortest_total">Shortest</option>
  </select>
  <select id="sortBy" title="Sort by">
    <option value="score">Best score</option>
    <option value="depart">Departure</option>
    <option value="price">Price</option>
    <option value="duration">Duration</option>
  </select>
  <select id="maxStops" title="Max stops">
    <option value="2">2 stops</option>
    <option value="1">1 stop</option>
    <option value="0">Direct</option>
  </select>
  <button onclick="loadData(true)">Live</button>
  <button id="autoBtn" onclick="toggleAuto()">Auto: OFF</button>
</div>

<div id="airspaceSection" class="section"></div>
<div id="visaSection" class="section" style="display:none"></div>
<div id="escapeSection" class="section" style="display:none"></div>
<div id="routesContainer"><div class="loading">Loading routes...</div></div>

<!-- Tabbed sections: News / Community / Intel -->
<div class="tabs">
  <div class="tab active" onclick="showTab('plan')">Action Plan</div>
  <div class="tab" onclick="showTab('news')">News</div>
  <div class="tab" onclick="showTab('community')">Community</div>
  <div class="tab" onclick="showTab('intel')">Intel</div>
</div>

<div id="tab-plan" class="tab-content active">
  <div class="steps section">
    <ol id="stepsList"></ol>
  </div>
</div>

<div id="tab-news" class="tab-content">
  <div class="section" id="newsSection"><div class="empty">Loading news...</div></div>
</div>

<div id="tab-community" class="tab-content">
  <div class="section" id="crowdsourceSection"><div class="empty">Loading X / embassy...</div></div>
  <div class="section" id="reportsSection"><div class="empty">No reports yet</div></div>
  <div class="section" id="ridesSection"><div class="empty">No ride shares yet</div></div>
</div>

<div id="tab-intel" class="tab-content">
  <div class="section" id="patternsSection"><div class="empty">Collecting data...</div></div>
  <div class="section" id="historySection"></div>
</div>

<div class="warn">Flight data changes rapidly during conflict. Always confirm with the airline.</div>

<div class="refresh-bar">
  <span class="timer" id="timer">—</span>
  <button onclick="loadData(true)">Refresh Now</button>
</div>

<script>
const API = '/api';
let autoRefresh = false, countdown = 0, countdownTimer = null, currentLang = 'en', T = {};

function qs(id) { return document.getElementById(id); }

async function loadData(live) {
  const speed = qs('speed').value, sort = qs('sortBy').value, stops = qs('maxStops').value;
  const url = `${API}/routes?speed=${speed}&sort_by=${sort}&max_stops=${stops}&live=${!!live}`;
  qs('timer').textContent = 'Loading...';
  try {
    const [routeRes, newsRes, reportsRes, ridesRes, crowdRes] = await Promise.all([
      fetch(url),
      fetch(`${API}/news`).catch(() => null),
      fetch(`${API}/reports`).catch(() => null),
      fetch(`${API}/rideshares`).catch(() => null),
      fetch(`${API}/crowdsource`).catch(() => null),
    ]);
    const data = await routeRes.json();
    render(data);
    if (newsRes && newsRes.ok) renderNews(await newsRes.json());
    if (reportsRes && reportsRes.ok) renderReports(await reportsRes.json());
    if (ridesRes && ridesRes.ok) renderRides(await ridesRes.json());
    if (crowdRes && crowdRes.ok) renderCrowdsource(await crowdRes.json());
    qs('timer').textContent = live ? 'Live data loaded' : 'Cached data';
    if (autoRefresh) startCountdown(120);
  } catch (e) {
    qs('timer').textContent = 'OFFLINE — using cached data';
  }
}

function render(data) {
  qs('updated').textContent = data.updated_ast + '  |  ' + data.scenario;

  // Recommendation
  const rec = data.recommendation;
  if (rec) {
    const cls = rec.action === 'go_now' ? 'go' : rec.action === 'wait' ? 'wait' : 'wait_short';
    const icon = rec.action === 'go_now' ? '>>>' : '...';
    qs('recoSection').innerHTML = `<div class="reco ${cls}">
      <span class="icon">${icon}</span>
      <div class="text">${rec.action === 'go_now' ? (T.go_now||'GO NOW') : (T.wait||'WAIT')}
        — ${rec.confidence} confidence<div class="reason">${rec.reason}</div></div></div>`;
  }

  // Airspace
  let air = '<h2>' + (T.airspace||'Airspace') + '</h2><div class="airspace">';
  data.airspace.closed.forEach(c => air += `<span class="tag closed">${c}</span>`);
  data.airspace.restricted.forEach(c => air += `<span class="tag restricted">${c}</span>`);
  data.airspace.open.forEach(c => air += `<span class="tag open">${c}</span>`);
  air += '</div>';
  qs('airspaceSection').innerHTML = air;

  // Visa checks
  if (data.visa_checks && data.visa_checks.length) {
    let vHtml = '<h2>Transit Visa</h2>';
    data.visa_checks.forEach(v => {
      const cls = v.visa_required === false ? 'ok' : v.visa_required === true ? 'warn' : '';
      const icon = v.visa_required === false ? 'NO VISA NEEDED' : v.visa_required === true ? 'VISA REQUIRED' : 'CHECK MANUALLY';
      vHtml += `<div class="visa-alert ${cls}"><strong>${v.hub}</strong>: ${icon} — ${v.notes}</div>`;
    });
    qs('visaSection').innerHTML = vHtml;
    qs('visaSection').style.display = 'block';
  }

  // Escape routes
  if (data.escape_routes && data.escape_routes.length) {
    let esc = '<h2>Ground Escape</h2><div class="airspace">';
    data.escape_routes.forEach(e => {
      const st = e.status === 'likely_open' ? 'open' : e.status === 'closed' ? 'closed' : 'restricted';
      esc += `<span class="tag ${st}" style="margin:2px">${e.from} → ${e.to} (${e.hours}h)</span>`;
    });
    esc += '</div>';
    qs('escapeSection').innerHTML = esc;
    qs('escapeSection').style.display = 'block';
  }

  // Routes
  let html = '';
  data.routes.forEach((r, i) => {
    const rank = i + 1;
    const rel = r.reliability === 'high' ? 'high' : r.reliability === 'low' ? 'low' : '';
    const changed = r.changed ? 'changed' : '';
    const price = r.price_economy ? `$${r.price_economy.toLocaleString()}` : '—';

    let badges = '';
    badges += r.risk === 'low' ? '<span class="badge low-risk">LOW RISK</span>'
      : r.risk === 'high' ? '<span class="badge high-risk">HIGH RISK</span>'
      : '<span class="badge med-risk">MED RISK</span>';
    if (r.changed) badges += '<span class="badge changed-badge">CHANGED</span>';

    html += `<div class="card ${rel} ${changed}" onclick="toggle(this)">
      <div class="card-head">
        <span class="rank">#${rank}</span>
        <div class="info">
          <div class="name">${r.name}</div>
          <div class="badges">${badges}</div>
        </div>
        <div class="meta">
          <div class="time">${Math.round(r.total_hours)}h</div>
          <div class="price">${price}</div>
        </div>
      </div>
      <div class="card-body">
        <div class="row"><span class="label">${T.departs||'Departs'}</span><span>${r.depart_ast || '—'}</span></div>
        <div class="row"><span class="label">${T.arrives||'Arrives'}</span><span>${r.arrive_cst || '—'}</span></div>
        <div class="row"><span class="label">Wait</span><span>${r.wait_hours}h</span></div>
        <div class="row"><span class="label">Ground</span><span>${r.ground_hours}h</span></div>
        <div class="row"><span class="label">Flight</span><span>${r.flight_hours}h</span></div>
        <div class="row"><span class="label">Stops</span><span>${r.num_stops}</span></div>
        <div class="row"><span class="label">Economy</span><span>${r.price_economy ? '$'+r.price_economy.toLocaleString() : '—'}</span></div>
        <div class="row"><span class="label">Business</span><span>${r.price_business ? '$'+r.price_business.toLocaleString() : '—'}</span></div>
        <div class="row"><span class="label">Score</span><span>${r.score} (lower = better)</span></div>
        ${r.ground.map(g => `<div class="ground">${g.from} → ${g.to} via ${g.via} (~${g.hours}h)</div>`).join('')}
        ${r.legs.map(l => {
          let lb = '';
          if (l.seats_available === true) lb += '<span class="badge seats-ok">SEATS OK</span>';
          if (l.seats_available === false) lb += '<span class="badge seats-no">SOLD OUT</span>';
          if (l.over_budget) lb += '<span class="badge over-budget">OVER BUDGET</span>';
          if (l.price_source) lb += `<span class="badge" style="background:#555">via ${l.price_source}</span>`;
          return `<div class="leg">
            <span class="fn">${l.flight}</span> ${l.airline}
            <span class="status ${l.status}">${l.status.toUpperCase()}</span><br>
            ${l.from} → ${l.to} &nbsp; ${l.duration}h &nbsp; ${l.aircraft}
            ${lb ? '<div class="leg-badges">'+lb+'</div>' : ''}
          </div>`;
        }).join('')}
        <div class="actions">
          ${r.booking_urls.map(u => `<a class="book" href="${u}" target="_blank" rel="noopener">${T.book_now||'BOOK NOW'}</a>`).join('')}
          ${r.contacts.map(c => `<a class="call" href="tel:${c.replace(/[^+0-9]/g,'')}">${T.call||'CALL'} ${c}</a>`).join('')}
        </div>
        ${r.notes ? `<div style="color:#888;margin-top:8px;font-size:12px">${r.notes}</div>` : ''}
      </div>
    </div>`;
  });
  qs('routesContainer').innerHTML = html;

  // Patterns
  if (data.patterns && data.patterns.length) {
    let pHtml = '<h2>Trend Analysis</h2>';
    data.patterns.forEach(p => {
      pHtml += `<div class="insight ${p.type||''}">${p.message}${p.confidence ? ' <span style="opacity:.6">('+p.confidence+')</span>' : ''}</div>`;
    });
    qs('patternsSection').innerHTML = pHtml;
  }

  // Steps
  qs('stepsList').innerHTML = `
    <li>Cross to Saudi via King Fahd Causeway</li>
    <li>Fly Dammam → Riyadh (~1h15m) or drive (~4h)</li>
    <li>Call airline to confirm flight is operating</li>
    <li>Book fastest CONFIRMED option</li>
    <li>Backup: Turkish Airlines via Istanbul (daily)</li>
    <li>Passport + cash (SAR & USD) + phone charger</li>`;

  if (data.routes.some(r => r.changed)) { try { navigator.vibrate?.(200); } catch(e) {} }
}

function renderNews(data) {
  let html = '<h2>Conflict News</h2>';
  if (data.airspace_alerts && data.airspace_alerts.length) {
    data.airspace_alerts.forEach(a => {
      const cls = a.type === 'potential_reopening' ? 'reopen' : '';
      html += `<div class="airspace-alert ${cls}">${a.type === 'potential_reopening' ? 'POSSIBLE REOPENING' : 'POSSIBLE CLOSURE'}: ${a.country} — ${a.headline} <span style="opacity:.7">(${a.source})</span></div>`;
    });
  }
  if (data.news && data.news.length) {
    data.news.forEach(n => {
      html += `<div class="news-item ${n.relevance}">
        <div class="headline">${n.title}</div>
        <div class="meta">${n.source} ${n.published ? '· '+n.published : ''} ${n.link ? '· <a href="'+n.link+'" target="_blank">Read</a>' : ''}</div>
      </div>`;
    });
  } else {
    html += '<div class="empty">No relevant conflict news found</div>';
  }
  qs('newsSection').innerHTML = html;
}

function renderReports(data) {
  let html = '<h2>Community Reports</h2>';
  if (data.reports && data.reports.length) {
    data.reports.forEach(r => {
      html += `<div class="report">
        <button class="vote" onclick="event.stopPropagation();upvote('${r.id}')">+${r.upvotes}</button>
        <strong>${r.flight||r.airport}</strong> ${r.status ? '<span class="status '+r.status+'">'+r.status.toUpperCase()+'</span>' : ''}
        <div style="margin-top:4px">${r.message}</div>
        <div style="font-size:11px;color:#666;margin-top:2px">${r.reporter} · ${new Date(r.timestamp).toLocaleString()}</div>
      </div>`;
    });
  } else {
    html += '<div class="empty">No community reports yet. Be the first to report!</div>';
  }
  qs('reportsSection').innerHTML = html;
}

function renderRides(data) {
  let html = '<h2>Ride Sharing</h2>';
  if (data.rides && data.rides.length) {
    data.rides.forEach(r => {
      html += `<div class="ride">
        <div class="route">${r.origin} → ${r.destination}</div>
        <div class="detail">${r.departure_time} · ${r.seats} seat(s) · <a href="tel:${r.contact}">${r.contact}</a></div>
        ${r.notes ? '<div class="detail">'+r.notes+'</div>' : ''}
      </div>`;
    });
  } else {
    html += '<div class="empty">No rides posted yet</div>';
  }
  qs('ridesSection').innerHTML = html;
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function renderCrowdsource(data) {
  let html = '<h2>X / Embassy / Telegram</h2>';
  if (data.x && data.x.length) {
    data.x.forEach(i => { html += `<div class="report"><strong>X</strong> ${esc(i.text)}${i.link ? ' <a href="${esc(i.link)}" target="_blank">→</a>' : ''}</div>`; });
  }
  if (data.embassy && data.embassy.length) {
    data.embassy.forEach(i => { html += `<div class="report"><strong>${esc(i.source)}</strong> ${esc(i.text)}${i.link ? ' <a href="${esc(i.link)}" target="_blank">→</a>' : ''}</div>`; });
  }
  if (data.telegram && data.telegram.length) {
    data.telegram.forEach(i => { html += `<div class="report"><strong>Telegram</strong> ${esc(i.text)}</div>`; });
  }
  if (!(data.x && data.x.length) && !(data.embassy && data.embassy.length) && !(data.telegram && data.telegram.length)) {
    html += '<div class="empty">No external feed (set NITTER_INSTANCE / TELEGRAM_RSS_URLS if needed)</div>';
  }
  qs('crowdsourceSection').innerHTML = html;
}

async function upvote(id) {
  await fetch(`${API}/reports/${id}/upvote`, {method:'POST'}).catch(()=>{});
  loadData(false);
}

function toggle(card) { card.querySelector('.card-body').classList.toggle('open'); }

function showTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    const tabs = ['plan','news','community','intel'];
    t.classList.toggle('active', tabs[i] === name);
  });
  document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
  const el = qs('tab-'+name);
  if (el) el.classList.add('active');
  if (name === 'intel') loadHistory();
}

async function loadHistory() {
  try {
    const res = await fetch(`${API}/history`);
    const data = await res.json();
    if (data.conflicts) {
      let html = '<h2>Historical Conflict Patterns</h2>';
      data.conflicts.forEach(c => {
        html += `<div class="insight"><strong>${c.conflict}</strong>: ${c.notes}
          ${c.airspace_recovery_days != null ? ' · Airspace recovered in '+c.airspace_recovery_days+'d' : ' · Airspace did not recover'}
        </div>`;
      });
      qs('historySection').innerHTML = html;
    }
  } catch(e) {}
}

function toggleAuto() {
  autoRefresh = !autoRefresh;
  qs('autoBtn').textContent = autoRefresh ? 'Auto: ON' : 'Auto: OFF';
  qs('autoBtn').classList.toggle('on', autoRefresh);
  if (autoRefresh) loadData(false);
  else { clearInterval(countdownTimer); qs('timer').textContent = 'Auto-refresh off'; }
}

function startCountdown(seconds) {
  clearInterval(countdownTimer);
  countdown = seconds;
  countdownTimer = setInterval(() => {
    countdown--;
    const m = Math.floor(countdown/60), s = countdown%60;
    qs('timer').textContent = `Next refresh: ${m}m ${s.toString().padStart(2,'0')}s`;
    if (countdown <= 0) { clearInterval(countdownTimer); loadData(false); }
  }, 1000);
}

async function switchLang(lang) {
  currentLang = lang;
  try {
    const res = await fetch(`${API}/translations?lang=${lang}`);
    T = await res.json();
    qs('titleText').textContent = T.title || 'EMERGENCY FLIGHT FINDER';
    loadData(false);
  } catch(e) {}
}

['speed','sortBy','maxStops'].forEach(id => qs(id).addEventListener('change', () => loadData(false)));
loadData(false);
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
</script>
</body>
</html>
