services:
  - type: web
    name: emergency-flight-finder
    runtime: python
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: uvicorn emergency_flights.web:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
    plan: free
    autoDeploy: true
